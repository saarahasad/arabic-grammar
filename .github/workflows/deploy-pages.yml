# Deploy the static site to GitHub Pages (https://<user>.github.io/<repo>/)
# Actions pinned to releases that run on Node.js 24 (avoids Node 20 deprecation warnings).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
